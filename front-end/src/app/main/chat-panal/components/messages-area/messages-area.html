                @for(msg of chatService.currentChatMessages(); track $index)
                {
                    <app-chat-message
                      [isSent]="msg.isSent"
                      [conversationId]="msg.conversationId"
                      [content]="msg.content"
                      [time]="msg.sentAt.toDateString()"
                      [status]="msg.status"
                      [showAvatar]="msg.showAvatar"
                      [avatarUrl]="msg.avatarUrl"
                      [senderName]="msg.senderName"
                      [attachments]="msg.attachments">
