<!-- RECEIVED MESSAGE -->
<div *ngIf="!isSent" class="flex items-end gap-3 max-w-[80%]">

  <!-- Avatar or placeholder spacer -->
  <div class="w-8 shrink-0">
    <img
      *ngIf="showAvatar && avatarUrl"
      [src]="avatarUrl"
      [alt]="senderName"
      class="w-8 h-8 rounded-full object-cover shadow-sm"
    />
  </div>

  <div class="group">
    <!-- Bubble -->
    <div
      class="bg-white border border-outline-variant/30 text-on-surface p-4 rounded-2xl rounded-bl-none chat-shadow text-body-md transition-all hover:translate-y-0.5"
      [class.p-2]="hasAttachments"
    >
      <!-- Attachments Grid -->
      <ng-container *ngIf="attachments.length > 0">
        <div
          class="grid gap-2 mb-2"
          [class.grid-cols-1]="attachments.length === 1"
          [class.grid-cols-2]="attachments.length === 2"
          [class.grid-cols-3]="attachments.length >= 3"
        >
          <ng-container *ngFor="let att of attachments; let i = index">
            <!-- Image Attachment -->
            <div
              *ngIf="att.type === 'image'"
              class="relative overflow-hidden rounded-lg"
              [class.w-64]="attachments.length === 1"
              [class.h-40]="attachments.length === 1"
              [class.aspect-square]="attachments.length > 1"
              [class.col-span-2]="attachments.length === 3 && i === 0"
              [class.row-span-2]="attachments.length === 3 && i === 0"
            >
              <img
                [src]="att.url"
                [alt]="att.name || 'Image attachment'"
                class="w-full h-full object-cover"
              />
              <!-- Overlay for extra images beyond 4 -->
              <div
                *ngIf="attachments.length > 4 && i === 3"
                class="absolute inset-0 bg-black/50 flex items-center justify-center"
              >
                <span class="text-white text-lg font-semibold">+{{ attachments.length - 4 }}</span>
              </div>
            </div>

            <!-- File Attachment -->
            <div
              *ngIf="att.type === 'file'"
              class="flex items-center gap-3 bg-surface-container-low rounded-xl p-3"
            >
              <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                </svg>
              </div>
              <div class="min-w-0">
                <p class="text-sm font-medium text-on-surface truncate">{{ att.name }}</p>
                <p class="text-[11px] text-on-surface-variant">{{ att.size }} • {{ att.fileType }}</p>
              </div>
            </div>
          </ng-container>
        </div>
        <p *ngIf="content" class="px-2 pb-2 text-body-md text-on-surface">{{ content }}</p>
      </ng-container>

      <!-- Text Only -->
      <ng-container *ngIf="attachments.length === 0">{{ content }}</ng-container>
    </div>

    <!-- Timestamp -->
    <span class="text-[10px] text-on-surface-variant ml-1 mt-1 block">{{ time }}</span>
  </div>
</div>


<!-- sent message user here -->

<!-- SENT MESSAGE -->
<div *ngIf="isSent" class="flex items-end justify-end gap-3 ml-auto max-w-[80%]">
  <div class="group text-right">
    <!-- Bubble -->
    <div
      class="bg-primary text-white p-4 rounded-2xl rounded-br-none shadow-lg shadow-primary/20 text-body-md transition-all hover:translate-y-[-2px]"
      [class.p-2]="hasAttachments"
    >
      <!-- Attachments Grid -->
      <ng-container *ngIf="attachments.length > 0">
        <div
          class="grid gap-2 mb-2"
          [class.grid-cols-1]="attachments.length === 1"
          [class.grid-cols-2]="attachments.length === 2"
          [class.grid-cols-3]="attachments.length >= 3"
        >
          <ng-container *ngFor="let att of attachments; let i = index">
            <!-- Image Attachment -->
            <div
              *ngIf="att.type === 'image'"
              class="relative overflow-hidden rounded-lg"
              [class.w-64]="attachments.length === 1"
              [class.h-40]="attachments.length === 1"
              [class.aspect-square]="attachments.length > 1"
              [class.col-span-2]="attachments.length === 3 && i === 0"
              [class.row-span-2]="attachments.length === 3 && i === 0"
            >
              <img
                [src]="att.url"
                [alt]="att.name || 'Image attachment'"
                class="w-full h-full object-cover"
              />
              <div
                *ngIf="attachments.length > 4 && i === 3"
                class="absolute inset-0 bg-black/50 flex items-center justify-center"
              >
                <span class="text-white text-lg font-semibold">+{{ attachments.length - 4 }}</span>
              </div>
            </div>

            <!-- File Attachment -->
            <div
              *ngIf="att.type === 'file'"
              class="flex items-center gap-3 bg-white/10 rounded-xl p-3"
            >
              <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                </svg>
              </div>
              <div class="min-w-0 text-left">
                <p class="text-sm font-medium text-white truncate">{{ att.name }}</p>
                <p class="text-[11px] text-white/70">{{ att.size }} • {{ att.fileType }}</p>
              </div>
            </div>
          </ng-container>
        </div>
        <p *ngIf="content" class="px-2 pb-2 text-body-md">{{ content }}</p>
      </ng-container>

      <!-- Text Only -->
      <ng-container *ngIf="attachments.length === 0">{{ content }}</ng-container>
    </div>

    <!-- Timestamp + Status -->
    <div class="flex items-center justify-end gap-1 mt-1">
      <span class="text-[10px] text-on-surface-variant block">{{ time }}</span>

      <ng-container [ngSwitch]="status">
        <!-- Pending -->
        <svg *ngSwitchCase="'pending'" class="w-3 h-3 text-on-surface-variant" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
        </svg>
        <!-- Sent (single check) -->
        <svg *ngSwitchCase="'sent'" class="w-3 h-3 text-on-surface-variant" viewBox="0 0 24 24" fill="currentColor">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
        <!-- Delivered (double grey) -->
        <svg *ngSwitchCase="'delivered'" class="w-3 h-3 text-on-surface-variant" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 7l-1.41-1.41-6.34 6.34 1.41 1.41L18 7zm4.24-1.41L11.66 16.17 7.48 12l-1.41 1.41L11.66 19l12-12-1.42-1.41zM.41 13.41L6 19l1.41-1.41L1.83 12 .41 13.41z"/>
        </svg>
        <!-- Seen (double teal / primary) -->
        <svg *ngSwitchCase="'seen'" class="w-3 h-3 text-primary" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 7l-1.41-1.41-6.34 6.34 1.41 1.41L18 7zm4.24-1.41L11.66 16.17 7.48 12l-1.41 1.41L11.66 19l12-12-1.42-1.41zM.41 13.41L6 19l1.41-1.41L1.83 12 .41 13.41z"/>
        </svg>
      </ng-container>
    </div>
  </div>
</div>
