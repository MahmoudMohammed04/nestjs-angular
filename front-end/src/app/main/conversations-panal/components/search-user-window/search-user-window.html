<div  (click)="onClickOpenSearchWindow($event)"  class="fixed inset-0 bg-gray-950 opacity-50 z-40">
</div>


<div 
  class="fixed z-50 p-6 border-2 border-outline-variant/30 min-w-90 rounded-2xl top-1/3 left-1/2 min-h-96"
  style="background-color: rgb(248, 248, 248);"
>

    <h2 class="font-headline-md text-headline-md mb-4">
        Start a conversation
    </h2>

    <div class="relative group">

        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/4">
            search
        </span>

        <input
          style="background-color: rgb(233, 233, 233);"
          class="w-full pl-10 pr-4 py-3 rounded-full"
          placeholder="Search by Email or Username"
          type="text"
          (input)="onTyping($event)"
        >

    </div>

     <!-- Users List -->
    <div class="flex-1 overflow-y-auto scrollbar-hide p-1.5">
        @for(user of userService.usersData(); track user.id)
        {
            <app-search-user-item
            [userId]="user.id"
            [userImage]="user.pictureUrl ?? ''"
            [Username]="user.username"]
            [Email]="user.email">

            </app-search-user-item>
        } 
        
    </div>

</div>
